services:
  redis:
    image: redis:7-alpine
    container_name: telegram-keyword-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: telegram-keyword-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-telegram_keyword_bot}
      POSTGRES_USER: ${POSTGRES_USER:-telegram_keyword_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telegram_keyword_bot}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-telegram_keyword_bot} -d ${POSTGRES_DATABASE:-telegram_keyword_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
  postgres_data:
