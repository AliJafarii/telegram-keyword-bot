name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy keyword bot
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail
          cd /root/telegram-keyword-bot
          test -z "$(git status --porcelain)" || { echo "Working tree is dirty"; exit 1; }
          git fetch origin main
          git pull --ff-only origin main
          npm ci
          npm run build
          rm -f tsconfig.build.tsbuildinfo
          systemctl restart telegram-keyword-bot.service
          sleep 5
          curl -fsS http://127.0.0.1:3000/healthz
          curl -fsS http://127.0.0.1:3000/readyz
          systemctl is-active telegram-keyword-bot.service
          REMOTE
